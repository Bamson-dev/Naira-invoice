# Render Blueprint — PostgreSQL + Redis required (create in Render dashboard)
services:
  - type: web
    name: naira-invoice
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: naira-invoice-db
          property: connectionString
      # Optional: Upstash free Redis URL — app runs without Redis (caching disabled)
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: APP_BASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: naira-invoice-db
    plan: free
    databaseName: naira_invoice
    user: naira
