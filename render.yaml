# Render Blueprint — https://render.com/docs/blueprint-spec
# After pushing, use Dashboard → New → Blueprint and select this repo.
services:
  - type: web
    name: naira-invoice
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: APP_BASE_URL
        sync: false
