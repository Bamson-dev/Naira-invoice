<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Recurring Invoices - NairaInvoice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/premium.css">
</head>
<body>
  <div class="app-layout">
    <nav class="sidebar">
      <div class="sidebar-logo">🧾 NairaInvoice</div>
      <ul class="sidebar-nav">
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="create-invoice.html">Create Invoice</a></li>
        <li><a href="invoices.html">Invoices</a></li>
        <li><a href="clients.html">Clients</a></li>
        <li><a href="analytics.html">Analytics</a></li>
        <li><a href="payments.html">Payments</a></li>
        <li><a href="recurring.html" class="active">Recurring</a></li>
        
        <li><a href="portal-preview.html">Shared Invoices</a></li>
                <li><a href="profile.html">Profile</a></li>
        <li><a href="#" id="logout-link">Logout</a></li>
      </ul>
    </nav>

    <main class="main-content">
      <div class="page-header">
        <div>
          <h1>Recurring Invoices</h1>
          <p class="page-subtitle">Save billing presets locally. Automated generation queues on the roadmap.</p>
        </div>
        <button type="button" class="btn btn-primary" onclick="window.location.href='create-invoice.html'">Create Invoice</button>
      </div>

      <div class="invoice-form feature-page-card">
        <h3 class="section-heading">New preset</h3>
        <form id="recurring-form">
          <div class="form-row">
            <div class="form-group">
              <label for="sch-title">Schedule name</label>
              <input id="sch-title" required placeholder="e.g. Retainer — Acme Ltd">
            </div>
            <div class="form-group">
              <label for="sch-cadence">Cadence</label>
              <select id="sch-cadence">
                <option>Weekly</option>
                <option>Bi-weekly</option>
                <option>Monthly</option>
                <option>Quarterly</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="sch-amount">Expected amount (₦)</label>
              <input type="number" id="sch-amount" min="0" step="0.01" value="0">
            </div>
            <div class="form-group">
              <label for="sch-note">Notes</label>
              <input id="sch-note" placeholder="Invoice template / reminders">
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-sm">Save preset</button>
        </form>
      </div>

      <div id="recurring-list" style="margin-top:24px;"></div>
    </main>
  </div>

  <script src="js/api-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/recurring.js"></script>

</body>
</html>
