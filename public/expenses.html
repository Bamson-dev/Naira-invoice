<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expenses - NairaInvoice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/premium.css">
</head>
<body>
  <div class="app-layout">
    <nav class="sidebar">
      <div class="sidebar-logo">🧾 NairaInvoice</div>
      <ul class="sidebar-nav">
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="create-invoice.html">Create Invoice</a></li>
        <li><a href="invoices.html">Invoices</a></li>
        <li><a href="clients.html">Clients</a></li>
        <li><a href="analytics.html">Analytics</a></li>
        <li><a href="payments.html">Payments</a></li>
        <li><a href="recurring.html">Recurring</a></li>
        
        <li><a href="portal-preview.html">Shared Invoices</a></li>
                <li><a href="profile.html">Profile</a></li>
        <li><a href="#" id="logout-link">Logout</a></li>
      </ul>
    </nav>

    <main class="main-content">
      <div class="page-header">
        <div>
          <h1>Expense tracking</h1>
          <p class="page-subtitle">Stored in your browser until a Supabase-backed ledger ships.</p>
        </div>
        <button type="button" class="btn btn-secondary btn-sm" onclick="exportExpensesCSV()">Export CSV</button>
      </div>

      <div class="invoice-form feature-page-card">
        <form id="expense-form">
          <div class="form-row">
            <div class="form-group">
              <label for="exp-title">Description</label>
              <input id="exp-title" required placeholder="Office rent">
            </div>
            <div class="form-group">
              <label for="exp-amount">Amount (₦)</label>
              <input type="number" id="exp-amount" min="0" step="0.01" required value="0">
            </div>
          </div>
          <div class="form-group">
            <label for="exp-cat">Category</label>
            <input id="exp-cat" placeholder="Operations, tooling, …">
          </div>
          <button type="submit" class="btn btn-primary btn-sm">Add expense</button>
        </form>
      </div>
      <div id="expense-list" style="margin-top:24px;"></div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/expenses.js"></script>
</body>
</html>
